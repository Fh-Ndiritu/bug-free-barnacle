<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Converter Tool | Cash is Clear Maximizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-wrapper">

        <!-- Upload Card -->
        <div class="admin-container">
            <header>
                <h1>Admin Converter Tool</h1>
                <p>Upload the Cash is Clear Maximizer Excel or CSV file to generate <code>data.json</code>.</p>
            </header>

            <main>
                <div class="upload-area" id="drop-zone">
                    <div class="upload-icon">📁</div>
                    <h3>Drag &amp; Drop Data File</h3>
                    <p>Supports .xlsx, .xls, .csv</p>
                    <input type="file" id="file-input" accept=".xlsx, .xls, .csv" hidden>
                    <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">Browse Files</button>
                </div>

                <!-- Sheet Picker (shown only when workbook has multiple sheets) -->
                <div id="sheet-picker" class="sheet-picker hidden">
                    <label for="sheet-select"><strong>Multiple sheets found — select one to process:</strong></label>
                    <select id="sheet-select"></select>
                </div>

                <div id="status" class="status-message hidden"></div>

                <div id="actions" class="actions-area hidden">
                    <button id="download-btn" class="btn btn-accent">⬇ Download data.json</button>
                </div>
            </main>
        </div>

        <!-- Preview Section (shown after parsing) -->
        <div id="preview-section" class="preview-section hidden"></div>

    </div>

    <!-- SheetJS for parsing Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
